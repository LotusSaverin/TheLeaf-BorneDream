<header class="site-header">
  <div class="container">
    <h1 class="site-title">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </h1>

    <nav class="site-nav">
      {% for p in site.header_pages %}
        {% assign page_obj = site.pages | where: "path", p | first %}
        {% if page_obj %}
          <a href="{{ page_obj.url | relative_url }}" class="site-nav__link{% raw %}{% endraw %}{% if page.url == page_obj.url %} active{% endif %}">{{ page_obj.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
