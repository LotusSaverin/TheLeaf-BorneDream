name: Publish Noto SC fonts to Release (manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare workspace
        run: |
          mkdir -p tmp/fonts
          ls -la

      - name: Download Noto Serif SC (400/700)
        run: |
          set -eux
          CSS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Safari/537.36" "https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap")
          echo "$CSS" > tmp/serif.css
          echo "$CSS" | awk 'BEGIN{RS="@font-face";FS="\n"} NR>1{ if(match($0,/font-weight: *([0-9]+)/,m) && match($0,/(https:[^)]*\.(woff2|woff|ttf|otf))/,u)){print m[1] " " u[1]} }' > tmp/serif-urls.txt
          cat tmp/serif-urls.txt || true
          while read -r W URL; do
            [ -z "$URL" ] && continue
            BASE="NotoSerifSC-${W}"
            EXT="${URL##*.}"
            OUT="tmp/fonts/${BASE}.${EXT}"
            echo "Downloading $URL -> $OUT"
            curl -L --fail --retry 3 -o "$OUT" "$URL" || echo "curl failed for $URL"
            ls -lh "$OUT" || true
          done < tmp/serif-urls.txt || true

      - name: Download Noto Sans SC (400/700)
        run: |
          set -eux
          CSS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Safari/537.36" "https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap")
          echo "$CSS" > tmp/sans.css
          echo "$CSS" | awk 'BEGIN{RS="@font-face";FS="\n"} NR>1{ if(match($0,/font-weight: *([0-9]+)/,m) && match($0,/(https:[^)]*\.(woff2|woff|ttf|otf))/,u)){print m[1] " " u[1]} }' > tmp/sans-urls.txt
          cat tmp/sans-urls.txt || true
          while read -r W URL; do
            [ -z "$URL" ] && continue
            BASE="NotoSansSC-${W}"
            EXT="${URL##*.}"
            OUT="tmp/fonts/${BASE}.${EXT}"
            echo "Downloading $URL -> $OUT"
            curl -L --fail --retry 3 -o "$OUT" "$URL" || echo "curl failed for $URL"
            ls -lh "$OUT" || true
          done < tmp/sans-urls.txt || true

      - name: List downloaded fonts
        run: |
          echo "Downloaded (tmp/fonts):"
          ls -la tmp/fonts || true

      - name: Zip fonts (robust)
        run: |
          set -eux
          if [ ! -d tmp/fonts ] || [ -z "$(ls -A tmp/fonts 2>/dev/null)" ]; then
            echo "No fonts found in tmp/fonts; aborting zip step" >&2
            exit 1
          fi
          python3 - <<'PY'
import os, shutil, sys
root = 'tmp'
base = 'fonts'
src = os.path.join(root, base)
if not os.path.isdir(src) or not os.listdir(src):
    print("No fonts to zip", file=sys.stderr)
    sys.exit(2)
shutil.make_archive(os.path.join(root, base), 'zip', root_dir=root, base_dir=base)
print("Created:", os.path.abspath(os.path.join(root, base + '.zip')))
PY
          ls -lh tmp/fonts.zip || true

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: noto-sc-${{ github.run_id }}
          release_name: "Noto SC fonts (run ${{ github.run_id }})"
          body: "Automated release of Noto SC font files (generated by workflow)."

      - name: Upload fonts zip as release asset (actions/upload-release-asset)
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: tmp/fonts.zip
          asset_name: fonts.zip
          asset_content_type: application/zip

      - name: Upload fonts zip via curl fallback
        if: ${{ always() }}
        run: |
          if [ -f tmp/fonts.zip ]; then
            UPLOAD_URL='${{ steps.create_release.outputs.upload_url }}'
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
            FILE="tmp/fonts.zip"
            FINAL_URL="$UPLOAD_URL?name=$(basename $FILE)"
            echo "Uploading $FILE to $FINAL_URL (curl fallback)"
            curl -s -X POST -H "Authorization: token $TOKEN" -H "Content-Type: application/zip" --data-binary @"$FILE" "$FINAL_URL" || (echo "curl upload failed" && exit 1)
          else
            echo "tmp/fonts.zip not found - skipping upload" >&2
            exit 1
          fi
